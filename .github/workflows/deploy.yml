# ─────────────────────────────────────────────
# CD Workflow: Deploy to Oracle on merge to main
# ─────────────────────────────────────────────
name: CD — Deploy to Production

on:
  push:
    branches: [main]   # Only triggers on main!

# Prevent two deploys running simultaneously
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test first
  # ─────────────────────────────────────────
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test_secret_for_ci
          JWT_EXPIRES_IN: 24h
          NODE_ENV: test

  # ─────────────────────────────────────────
  # JOB 2: Deploy (only if tests pass!)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: test    # ← CRITICAL! Wait for tests!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} \
              bash << 'ENDSSH'

            set -e
            echo "🚀 Starting deployment..."
            echo "Time: $(date)"

            cd ~/todo-app

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🐳 Rebuilding Docker containers..."
            docker compose up -d --build

            echo "⏳ Waiting for containers..."
            sleep 15

            echo "🔍 Verifying deployment..."
            HEALTH=$(curl -s http://localhost/api/health || echo "failed")

            if echo "$HEALTH" | grep -q "ok"; then
              echo "✅ Deployment successful!"
              docker compose ps
            else
              echo "❌ Deployment failed!"
              docker compose logs --tail=20
              exit 1
            fi

          ENDSSH

      - name: Report success
        if: success()
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
          echo "Time: $(date)"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo "Failed commit: ${{ github.sha }}"